<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Inscreva-se na nossa Newsletter</title>
</head>

<body>
    <!--Cabeçalho-->
    <header class="container">
        <div class="logo">
            <img src="img/logo.png" alt="Logo site">
            <h2>Otávio Augusto</h2>
        </div>
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Serviços</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
            <a href="#">FAQ</a>
        </nav>
    </header>
    <!--Conteúdo Principal-->
    <main class="container">
        <div class="content">
            <h1>
                Inscreva-se Agora <br>
                na Nossa <span>Newsletter</span>
            </h1>
            <p>
                Lorem ipsum, dolor sit amet consectetur adipisicing elit. Libero quos nesciunt veniam aliquam esse
                possimus dolorem quasi fuga eveniet nobis natus, minima maxime, illum quod soluta alias reiciendis
                dolore neque.
            </p>
            <form>
                <div class="form-group">
                    <input type="text" placeholder="Nome">
                </div>
                <div class="form-group">
                    <input type="email" placeholder="E-mail">
                </div>
                <div class="form-group">
                    <button type="submit">Enviar</button>
                </div>
            </form>
        </div>
        <div class="image-container">
            <div class="ellipse"></div>
            <img src="img/banner.jpg" alt="Banner Usuário digitando">
        </div>
    </main>
</body>

</html>
